<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eve</title>
    <style>
        /* إعدادات الخطوط والخلفية العامة */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Reem+Kufi:wght@500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #fbc531 0%, #a55eea 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* الحاوية الرئيسية للكارد */
        .card-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.5);
            position: relative;
            transform: translateY(0);
            transition: all 0.4s ease;
        }

        .card-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        /* إطار الصورة الشخصية والديكور حولها */
        .profile-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 25px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 8px 20px rgba(165, 94, 234, 0.3);
        }

        /* تأثير النجوم اللامعة حول الصورة */
        .sparkle {
            position: absolute;
            font-size: 20px;
            animation: blink 2s infinite ease-in-out;
        }
        .sp-1 { top: -10px; left: -10px; animation-delay: 0s; }
        .sp-2 { bottom: 10px; right: -15px; animation-delay: 0.5s; }
        .sp-3 { top: 50%; left: -20px; animation-delay: 1s; }

        /* النصوص والأسماء */
        .title {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 28px;
            color: #4b3080;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 15px;
            color: #747d8c;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        /* قسم الرسالة المكتوبة داخل ورق مطوي */
        .message-box {
            background: #fff;
            border-left: 4px solid #a55eea;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: right;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
        }

        .message-box p {
            font-size: 15px;
            color: #4b5563;
            line-height: 1.8;
        }

        /* أزرار التفاعل أو الروابط */
        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(90deg, #a55eea, #ff7675);
            color: #fff;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(165, 94, 234, 0.4);
            transition: all 0.3s ease;
            width: 100%;
        }

        .action-btn:hover {
            opacity: 0.9;
            box-shadow: 0 8px 20px rgba(165, 94, 234, 0.6);
            transform: scale(1.02);
        }

        /* الأنميشن الخاص باللمعان */
        @keyframes blink {
            0%, 100% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; filter: drop-shadow(0 0 5px #fbc531); }
        }

        /* قلوب متساقطة في الخلفية لخلق جو لطيف */
        .heart-fall {
            position: absolute;
            color: rgba(255, 255, 255, 0.3);
            font-size: 24px;
            pointer-events: none;
            animation: fall 6s linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="profile-wrapper">
            <span class="sparkle sp-1">✨</span>
            <span class="sparkle sp-2">💖</span>
            <span class="sparkle sp-3">⭐</span>
            <img src="https://img.alfrsantv.com/img/f178217965009281.png" alt="Profile Image" class="profile-img">
        </div>

        <h1 class="title">Eve</h1>
        <p class="subtitle">كل التفاصيل اللطيفة تليق بكِ، هُنا مساحة صنعت لأجلكِ فقط.</p>

        <div class="message-box">
            <p>
                اليوم حبيت أعملك حاجة مختلفة وشبهك.. مكان هادي فيه كلام طالع من القلب. ربنا يخليكي ليا وميحرمنيش من ضحكتك اللي بتنور الدنيا دايماً. 🌸
            </p>
        </div>

        <button class="action-btn" onclick="celebrate()">اضغطي هنا لو سمحتِ 🪄</button>
    </div>

    <script>
        function celebrate() {
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('heart-fall');
                    heart.innerHTML = ['🌸', '✨', '💖', '⭐'][Math.floor(Math.random() * 4)];
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
                    heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                    document.body.appendChild(heart);
                    
                    // إزالة العنصر بعد انتهاء الأنميشن
                    setTimeout(() => { heart.remove(); }, 6000);
                }, i * 200);
            }
        }
    </script>
</body>
</html>
