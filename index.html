<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساحة خاصة لأجمل بنت ✨</title>
    <style>
        /* إعدادات الخطوط والخلفية العامة */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Reem+Kufi:wght@500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* منع تحديد النصوص في الصفحة بشكل عام لزيادة الحماية والاستايل الجمالي */
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #fbc531 0%, #a55eea 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* لمنع ظهور شريط التمرير أثناء تساقط الورود */
            padding: 20px;
            position: relative;
        }

        /* الحاوية الرئيسية للكارد */
        .card-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 45px 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 10; /* ليكون فوق الخلفية المتساقطة */
            transform: translateY(0);
            transition: all 0.4s ease;
        }

        .card-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        /* إطار الصورة الشخصية والحماية */
        .profile-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 30px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 8px 20px rgba(165, 94, 234, 0.3);
            /* منع السحب والنسخ للمتصفحات */
            pointer-events: none; 
            -webkit-touch-callout: none;
        }

        /* طبقة شفافة غير مرئية فوق الصورة تماماً لمنع الكليك يمين والتفتيش */
        .img-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            z-index: 5;
            background: transparent;
        }

        /* تأثير النجوم والقلوب اللامعة حول الصورة */
        .sparkle {
            position: absolute;
            font-size: 22px;
            z-index: 6;
            animation: blink 2s infinite ease-in-out;
        }
        .sp-1 { top: -10px; left: -10px; animation-delay: 0s; }
        .sp-2 { bottom: 10px; right: -15px; animation-delay: 0.5s; }
        .sp-3 { top: 50%; left: -25px; animation-delay: 1s; }

        /* النصوص والأسماء */
        .title {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 30px;
            color: #4b3080;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 15px;
            color: #747d8c;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        /* قسم الرسالة المكتوبة داخل ورق مطوي */
        .message-box {
            background: rgba(255, 255, 255, 0.9);
            border-right: 4px solid #a55eea; /* تم التعديل لليمين ليتناسب مع الاتجاه العربي */
            border-radius: 12px;
            padding: 22px;
            text-align: right;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.01), 0 4px 12px rgba(0,0,0,0.03);
        }

        .message-box p {
            font-size: 15.5px;
            color: #4b5563;
            line-height: 1.9;
        }

        /* الأنميشن الخاص باللمعان حول الصورة */
        @keyframes blink {
            0%, 100% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; filter: drop-shadow(0 0 5px #fbc531); }
        }

        /* عناصر متساقطة تلقائياً في الخلفية */
        .heart-fall {
            position: absolute;
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- كارد الصفحة الرئيسي -->
    <div class="card-container" oncontextmenu="return false;">
        <div class="profile-wrapper">
            <span class="sparkle sp-1">✨</span>
            <span class="sparkle sp-2">💖</span>
            <span class="sparkle sp-3">🌸</span>
            
            <!-- طبقة الحماية الشفافة فوق الصورة -->
            <div class="img-overlay"></div>
            
            <!-- استبدل الرابط أدناه برابط صورتها الشخصية -->
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500" alt="Profile" class="profile-img" oncontextmenu="return false;" dragstart="return false;" ondragstart="return false;">
        </div>

        <h1 class="title">إلى الجميلة أسماء ✨</h1>
        <p class="subtitle">كل التفاصيل اللطيفة تليق بكِ، هُنا مساحة صنعت لأجلكِ فقط.</p>

        <div class="message-box">
            <p>
                اليوم حبيت أعملك حاجة مختلفة وشبهك.. مكان هادي فيه كلام طالع من القلب. ربنا يخليكي ليا وميحرمنيش من ضحكتك اللي بتنور الدنيا دايماً. 🌸
            </p>
        </div>
    </div>

    <!-- جافا سكريبت لمنع الكليك يمين على الصفحة وتوليد الأنميشن التلقائي -->
    <script>
        // 1. منع الكليك يمين تماماً على الكارد والصورة لحمايتها
        document.addEventListener('contextmenu', function(e) {
            if (e.target.classList.contains('profile-img') || e.target.classList.contains('img-overlay')) {
                e.preventDefault();
            }
        });

        // 2. دالة توليد تأثير التساقط التلقائي في الخلفية بدون الحاجة لزر
        function autoCelebrate() {
            const icons = ['🌸', '✨', '💖', '⭐', '🎈'];
            const heart = document.createElement('div');
            heart.classList.add('heart-fall');
            heart.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            
            heart.style.left = Math.random() * 100 + 'vw';
            const duration = Math.random() * 4 + 4; // سرعة التساقط بين 4 إلى 8 ثواني
            heart.style.animationDuration = duration + 's';
            heart.style.fontSize = (Math.random() * 20 + 12) + 'px'; // أحجام عشوائية ناعمة
            
            document.body.appendChild(heart);
            
            // إزالة العنصر بعد انتهاء الأنميشن تلقائياً للحفاظ على أداء المتصفح
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // تشغيل التساقط التلقائي بانتظام (عنصر جديد كل 400 مللي ثانية)
        setInterval(autoCelebrate, 400);
    </script>
</body>
</html>
