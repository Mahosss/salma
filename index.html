<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eve</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital@1&family=Cairo:wght@300;400;700&display=swap');

        :root {
            --primary-color: #a55eea;
            --secondary-color: #fd79a8;
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            cursor: default;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* خلفية متحركة احترافية */
        .bg-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            filter: blur(80px);
            opacity: 0.6;
        }
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--primary-color);
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }
        .blob-2 {
            background: var(--secondary-color);
            right: 10%;
            top: 10%;
            animation-delay: -5s;
            width: 300px;
            height: 300px;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) rotate(0deg); }
            to { transform: translate(20%, 20%) rotate(360deg); }
        }

        /* الكارد الرئيسي بتأثير زجاجي معزز */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 35px;
            padding: 50px 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.08);
            z-index: 10;
            position: relative;
        }

        /* حماية الصورة وتنسيقها */
        .profile-section {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 35px;
        }
        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            pointer-events: none;
        }
        .img-guard {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%; z-index: 15;
            background: transparent;
        }

        .stars-container {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0; pointer-events: none;
        }

        /* النصوص */
        .name-title {
            font-family: 'Amiri', serif;
            font-size: 38px;
            color: #2d3436;
            margin-bottom: 10px;
            font-style: italic;
        }

        .typing-text {
            min-height: 80px; /* لضمان عدم اهتزاز الكارد أثناء الكتابة */
            font-size: 17px;
            color: #636e72;
            line-height: 1.8;
            margin-top: 20px;
        }

        /* مشغل موسيقى بسيط */
        .music-player {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 100;
            background: #fff;
            padding: 10px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .play-btn {
            width: 35px; height: 35px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer !important;
        }

        /* أنميشن العناصر المتساقطة */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 5;
            animation: float linear forwards;
        }
        @keyframes float {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="bg-blobs">
        <div class="blob"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="music-player">
        <div class="play-btn" id="musicToggle">♪</div>
        <span style="font-size: 12px; color: #666; margin-left: 10px;">لحظة هدوء</span>
        <audio id="bgAudio" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="glass-card">
        <div class="profile-section">
            <div class="img-guard"></div>
            <img src="https://xatimg.com/image/KOO1Vs2RpIpF.png" class="profile-img">
            <div class="stars-container" id="stars"></div>
        </div>

        <h1 class="name-title">Eve</h1>
        
        <div class="typing-text" id="typewriter"></div>
    </div>

    <script>
        // 1. تأثير الكتابة الآلية
        const text = "أنتِ لستِ مجرد شخص عابر في الحياه، أنتِ التفاصيل اللطيفة التي تجعل هذا العالم يبدو أجمل. أردتُ أن أهديكِ مكاناً يشبه هدوء روحكِ وجمال ضحكتكِ.. دمتِ شيئاً جميلاً لا ينتهي. 🌸";
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 50); // سرعة الكتابة
            }
        }

        // 2. تشغيل الكتابة عند فتح الصفحة
        window.onload = typeWriter;

        // 3. مشغل الموسيقى
        const audio = document.getElementById("bgAudio");
        const btn = document.getElementById("musicToggle");
        btn.onclick = function() {
            if (audio.paused) {
                audio.play();
                btn.innerHTML = "||";
            } else {
                audio.pause();
                btn.innerHTML = "♪";
            }
        };

        // 4. توليد العناصر المتساقطة (ورود ونجوم)
        function createParticle() {
            const icons = ['🌸', '✨', '💖', '⭐', '☁️'];
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            p.style.left = Math.random() * 100 + 'vw';
            const duration = Math.random() * 5 + 5;
            p.style.animationDuration = duration + 's';
            p.style.fontSize = Math.random() * 15 + 15 + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), duration * 1000);
        }
        setInterval(createParticle, 500);

        // 5. حماية إضافية
        document.onkeydown = function(e) {
            // منع Ctrl+U, Ctrl+S, Ctrl+Shift+I
            if (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83 || (e.shiftKey && e.keyCode === 73))) {
                return false;
            }
        };
    </script>
</body>
</html>
