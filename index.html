<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salma2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap');

        :root {
            --gold: #d4af37;
            --light-gold: #f4d03f;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at 20% 30%, #fcecf6, #e3d9e8, #fdf6ec);
            overflow: hidden;
            position: relative;
        }

        
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            top: -10%;
            font-size: 20px;
            animation: fall linear infinite;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

      
        .card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 40px;
            padding: 40px;
            width: 90%; 
            max-width: 380px; 
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            animation: float 6s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        
        .avatar-ring {
            width: 140px; height: 140px;
            border-radius: 50%;
            margin: 0 auto 20px;
            padding: 5px;
            background: linear-gradient(45deg, var(--gold), #fff, var(--gold));
            position: relative;
            transition: transform 0.5s;
        }
        .avatar-ring:hover { transform: scale(1.05); }
        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
        }

        
        h1 { 
            color: #5d4037; 
            margin: 10px 0; 
            font-weight: 700;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.6), 0 0 20px rgba(212, 175, 55, 0.4);
        }
        
        p { color: #8d6e63; font-size: 0.9rem; margin-bottom: 30px; }

        
        .player-bar {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        #playPauseBtn {
            background: var(--gold); border: none; color: white;
            width: 50px; height: 50px; border-radius: 50%;
            cursor: pointer; font-size: 20px; margin-bottom: 10px;
            transition: 0.3s;
        }
        .progress { width: 100%; height: 6px; background: rgba(255,255,255,0.5); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { width: 0%; height: 100%; background: var(--gold); }
        .song-title { font-size: 0.9rem; color: #5d4037; font-weight: 500; }

        .avatar {
    
    user-select: none;
    -webkit-user-select: none;
    
    -webkit-user-drag: none;
    pointer-events: none; 
}
    </style>
</head>
<body>


    <div class="particles">
        <div class="particle" style="left: 10%; animation-duration: 8s;">🌸</div>
        <div class="particle" style="left: 30%; animation-duration: 12s;">🦋</div>
        <div class="particle" style="left: 50%; animation-duration: 10s;">🌸</div>
        <div class="particle" style="left: 70%; animation-duration: 15s;">🦋</div>
        <div class="particle" style="left: 90%; animation-duration: 9s;">🌸</div>
    </div>

    <div class="card">
        <div class="avatar-ring">
            <img src="https://xatimg.com/image/YqjKEtyM2jfU.jpg" class="avatar" alt="Profile">
        </div>

        <h1>Eve</h1>
        <p>مختلفة لا اشبة احد.</p>

        <div class="player-bar">
            <button id="playPauseBtn" onclick="togglePlay()">▶</button>
            <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
            <div class="song-title">وائل جسار - غريبة الناس</div>
            <audio id="myAudio" src="https://alfrsantv.com/short/videos/Ghariba_ElNas.mp3"></audio>
        </div>
    </div>

    <script>
        const audio = document.getElementById("myAudio");
        const playBtn = document.getElementById("playPauseBtn");
        const progressFill = document.getElementById("progressFill");

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = "⏸";
            } else {
                audio.pause();
                playBtn.innerHTML = "▶";
            }
        }

        audio.ontimeupdate = function() {
            if (audio.duration > 0) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = percent + "%";
            }
        };
    </script>
</body>
</html>
